version: 2

models:
  - name: bronze_events
    columns:
      - name: event_id
        tests:
          - not_null
      - name: user_id
      - name: session_id
      - name: order_id
      - name: product_id
      - name: quantity
      - name: price
      - name: currency
      - name: event_time
        tests:
          - not_null
      - name: event_type
        tests:
          - accepted_values:
              values: ['page_view', 'add_to_cart', 'checkout_started', 'order_created', 'order_paid', 'order_cancelled']
      - name: status
        tests:
          - accepted_values:
              values: ['viewed', 'carted', 'checkout_started', 'created', 'paid', 'cancelled']
      - name: payment_method
      - name: device
      - name: source
      - name: ingested_at
      - name: raw_payload

  - name: silver_events
    columns:
      - name: event_id
        tests:
          - unique
          - not_null
      - name: event_type
      - name: event_time
      - name: user_id
      - name: session_id
      - name: order_id
      - name: product_id
      - name: quantity
      - name: price
      - name: currency
      - name: status
      - name: payment_method
      - name: device
      - name: source
      - name: ingested_at
      - name: raw_payload
